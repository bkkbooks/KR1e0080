body:
  text: 春秋正㫖春秋類提要臣等謹案春秋正㫖一卷明髙拱撰拱字肅卿新鄭人嘉靖辛丑進士官至吏部尚書中極殿大學士諡文襄事蹟具明史列傳是編之作蓋以宋以來說春秋者穿鑿傅㑹欲尊聖人而不知所以尊欲明書法而不知所以明乃推原經意以訂其謬首論春秋乃明天子之義非以天子賞罰之權自居次論孔子必不敢改周正朔而用夏時次論託之魯史者以其尚存周禮非以其周公之後而假之次論王不稱天乃偶然異文滕侯稱子乃時王所黜聖人斷無貶削天子降封諸侯之理次論齊人歸鄆歡龜陰田非聖人自書其功深斥胡傳以天自處之非次論春秋作於哀公十四年乃孔子卒之前一嵗適遇獲麟因而書之經非感麟而作麟亦非應經而至次論說經以左氏為長胡氏為有激而作餘諸家之紛紛皆由誤解天子之事一語其言皆明白正大足破說春秋者之痼疾卷帙雖少要其大義凜然多得經意固迥出諸儒之上矣乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:288fd6a562c861365e4a615211dec2378553a7383cf435d054c088dc4650d961
